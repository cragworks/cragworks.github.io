	function initGPContext()
	{
		// Initialize the canvas for displaying the Gamepad and the rendering context.
		gpCanvas = window.document.getElementById("gpCanvas");
		gpCanvas.width = GP_WIDTH;
		gpCanvas.height = GP_HEIGHT;
		gpContext = gpCanvas.getContext("2d", {antialias: '2x'});
  		gpContext.font = 'italic 20pt Times Roman';

  		if(gpContext.fillStyle === "rgb(0,0,0)")
			gpContext.fillStyle = "rgb(255,255,255)";
		else
			gpContext.fillStyle = "rgb(0,0,0)";

  	 	gpContext.fillText('MUSIC LOADING', 50, 450);
  	 	gpContext.fillText('Place the Wii U GamePad on a Flat Surface for calibration!', 50, 400);
	}

	//flashing "MUSIC LOADING"
		var timeL = 1;
		var interval = setInterval(function() { 
		      timeL++;

		      if(timeL%2==0)
				gpContext.fillStyle = "rgb(255,255,255)";
			  else
				gpContext.fillStyle = "rgb(0,0,0)";

		   if (assetsLoaded < assetsToLoad.length) {
  	 			gpContext.fillText('GRAPHICS LOADING', 50, 450);
		   }
		   else
		   {
		   		gpContext.fillText('MUSIC LOADING', 50, 450);
		   }
		   // else { 
		   //    clearInterval(interval);
		   // }
		}, 500);

	function randFloatN(min, max)
	{

	function rect(x, y, width, height) {

 		 this.width = width;

  		 this.xVel = 0;
  		 this.xAcc = randFloatN(0,1);

  		 this.yAcc = randFloat(3,9);

  		// 	 this.waitDropSec = randFloat(0, 20);

  			 this.waitDropSec = 0;

  		 this.flipToZero = false;
  		 this.flipToFull = false;
  		 this.flipPr = -1; //0 to 32 because 4 x 8 this is which flips first
  		 this.haloSec = 0;
  		 this.haloMax = 20;
  		 this.fadeToZero = false;
	}

	function dropPieceRandomlyLeftOrRight(r, c)
	{
		rectBoard[r][c].x+=rectBoard[r][c].xVel;

		//make randomly move left and right a little
		if(rectBoard[r][c].xMaxVel > 0 && rectBoard[r][c].xVel < rectBoard[r][c].xMaxVel)
			rectBoard[r][c].xVel+=rectBoard[r][c].xAcc;
		else if(rectBoard[r][c].xMaxVel < 0 && rectBoard[r][c].xVel > rectBoard[r][c].xMaxVel)
			rectBoard[r][c].xVel+=rectBoard[r][c].xAcc;
	}

	function dropPieceRandomlyUpOrDown(r, c)
	{
		rectBoard[r][c].y+=rectBoard[r][c].xVel;

		//make randomly move left and right a little
		if(rectBoard[r][c].xMaxVel > 0 && rectBoard[r][c].xVel < rectBoard[r][c].xMaxVel)
			rectBoard[r][c].xVel+=rectBoard[r][c].xAcc;
		else if(rectBoard[r][c].xMaxVel < 0 && rectBoard[r][c].xVel > rectBoard[r][c].xMaxVel)
			rectBoard[r][c].xVel+=rectBoard[r][c].xAcc;
	}

	function dropPieceUp(r, c)
	{
		if(msecDropDirection > 0 && dropDirection == 0 )
		{
			dropPieceDown(r, c);
			msecDropDirection--;
		}
		else
		{
			rectBoard[r][c].y+=rectBoard[r][c].yVel;
			if(rectBoard[r][c].yVel > -rectBoard[r][c].yMaxVel)
				rectBoard[r][c].yVel-=rectBoard[r][c].yAcc;

			//make randomly move left and right a little
			dropPieceRandomlyLeftOrRight(r, c);
		}
	}

	function dropPieceDown(r, c)
	{
		if(msecDropDirection > 0 && dropDirection == 1 )
		{
			dropPieceUp(r, c);
			msecDropDirection--;
		}
		else
		{
			rectBoard[r][c].y+=rectBoard[r][c].yVel;
			if(rectBoard[r][c].yVel < rectBoard[r][c].yMaxVel)
				rectBoard[r][c].yVel+=rectBoard[r][c].yAcc;

			dropPieceRandomlyLeftOrRight(r, c);
		}
	}

	function dropPieceLeft(r, c)
	{	
		if(msecDropDirection > 0 && dropDirection == 2 )
		{
			dropPieceRight(r, c);
			msecDropDirection--;
		}
		else
		{
			rectBoard[r][c].x+=rectBoard[r][c].yVel;
			if(rectBoard[r][c].yVel > -rectBoard[r][c].yMaxVel)
				rectBoard[r][c].yVel-=rectBoard[r][c].yAcc;

			//make randomly move left and right a little
			dropPieceRandomlyUpOrDown(r, c);
		}
	}

	function dropPieceRight(r, c)
	{	
		if(msecDropDirection > 0 && dropDirection == 3 )
		{
			dropPieceLeft(r, c);
			msecDropDirection--;
		}
		else
		{
			rectBoard[r][c].x+=rectBoard[r][c].yVel;
			if(rectBoard[r][c].yVel < rectBoard[r][c].yMaxVel)
				rectBoard[r][c].yVel+=rectBoard[r][c].yAcc;

			//make randomly move left and right a little
			dropPieceRandomlyUpOrDown(r, c);
		}
	}

	function dropBoardPieces(direction) //0 up 1 down 2 left 3 right 
	{
		for (var r = 0; r < numRows; r++)
		{
			for(var c = 0; c < numCols; c++)
			{
				if(rectBoard[r][c].waitDropSec>0)
					rectBoard[r][c].waitDropSec--;
				else
				{
					switch( direction )
					{
						case 0:
							dropPieceUp(r, c);
							break;
						case 1: 
							dropPieceDown(r, c);
							break;
						case 2:
							dropPieceLeft(r, c);
							break;
						case 3:
							dropPieceRight(r, c);
							break;
					}
				}
			}
		}
	}

	function flipPieceToZeroSize(r, c, flipAmount)
	{
		if(rectBoard[r][c].width > 0)
		{
			rectBoard[r][c].width-=flipAmount;
			rectBoard[r][c].x+=flipAmount/2;
		}
		else if(rectBoard[r][c].width <= 0)
		{
			rectBoard[r][c].flipToZero = false;
			rectBoard[r][c].flipToFull = true;
      		playFlipSound();
		}	
	}

	function flipPieceToNormalSize(r, c, flipAmount)
	{
		if(rectBoard[r][c].width < pRad)
		{
			rectBoard[r][c].width+=flipAmount;
			rectBoard[r][c].x-=flipAmount/2;
		}
		else
		{

			var centerDif = (rLen - pRad)/2;
			//var startingX = -rLen/2;
			rectBoard[r][c].width = pRad;
			rectBoard[r][c].x = startingX + c * rLen + centerDif;
			rectBoard[r][c].flipPr = -1;
			rectBoard[r][c].flipToFull = false;
		}
	}

	function calcFlipAmount(i)
	{
		var flipAmount = pRad;
		var divide = 2;
		switch(nowPr[i])
		{
			case 0:
				divide = 5;
				break;
			case 1:
				divide = 3.25;
				break;
			case 2:
				divide = 2.75;
				break;
			case 3:
				divide = 2.5;
				break;
			case 4:
				divide = 2.25;
				break;
			case 5:
				divide = 2.0;
				break;
			case 6:
				divide = 1.75;
				break;
			case 7:
				divide = 1.5;
				break;
		}
		flipAmount = flipAmount/divide;
		return flipAmount;
	}

	function flipPiece(r, c, flipAmount)
	{
		if(rectBoard[r][c].flipToZero == true)
		{
			flipPieceToZeroSize(r, c, flipAmount);
		}
		else
		{
			flipPieceToNormalSize(r, c, flipAmount);
		}
	}
	function flipPiecesRect()
	{
		for(var i = 0; i < numPr; i++)
		{
		var flipAmount = calcFlipAmount(i);
		var matchedAPr = false;

		for (var r = 0; r < numRows; r++) 
		{
			for(var c = 0; c < numCols; c++) 
			{
				if(nowPr[i] == rectBoard[r][c].flipPr)
				{
					matchedAPr = true;
					isFlipping = true;
					flipPiece(r, c, flipAmount);
				}
				else if(rectBoard[r][c].flipToZero==true)
				{
					isFlipping = true;
					flipPiece(r, c, flipAmount/10);
				}
				else if(rectBoard[r][c].flipToFull==true)
				{
					isFlipping = true;
					flipPiece(r, c, flipAmount/10);
				}
			}
		}
		if(matchedAPr == false)
		{
			if(nowPr[i] < 8)
				nowPr[i]++;
			isFlipping = false;
		}
	}
	}

	function doTransitionFade()
	{
		if(trans_total==-1)

        //// if delta <=0 or >=1 then reverse
       // if (alpha <= 0 || alpha >= 1) delta = -delta;
        /// clear canvas
        if(trans_total>15)
        {
		alpha += delta;
        	gpContext.fillRect(0, 0, GP_WIDTH, GP_HEIGHT);

        gpContext.globalAlpha = alpha;
        /// re-draw image
        gpContext.drawImage(img, 0, 0);

		gpContext.fillStyle = color;
		}
		trans_total++;
		if(trans_total==35)

	function doTransitionCheck()
	{
		if(trans_total==-1)
			return;
		var	color = "rgb(255,255,255)";
		gpContext.fillStyle = color;

		var num = 0;

		if(time%1==0)
			trans_total++;

		for (var r = 0; r < numRows && num < trans_total; r++)
		{
			for(var c = 0; c < numCols && num < trans_total; c++)
			{
				gpContext.fillRect(rectBoard[r][c].x,rectBoard[r][c].y,rectBoard[r][c].width+10,rectBoard[r][c].height+10);
			num+=1;
				
			}

	function tallyBoardPiecesAndWinner()

			for(var c = 0; c < numCols; c++)

	function getAvailableMovesArray()
	{
		var movesBoard = new Array(numRows); //0 = no move available, 1 = move available
		for(var i = 0; i < numRows; i++)
		{
			movesBoard[i] = new Array(numCols);

			for(var j = 0; j < numCols; j++)
				movesBoard[i][j] = 0;
		}
		var noMoves = true;
		var notWhosTurn = whosTurn*-1;

		for (var r = 0; r < numRows; r++) 
		{
			for(var c = 0; c < numCols; c++) 
			{
				if(board[r][c]==0)
				{
					var canInsert = false;

					if(whosTurn!=0) //not starting move
					{
					if( checkCanInsertBoardPieceUpLeft(r, c, notWhosTurn, whosTurn, false) ) canInsert = true;
					if( checkCanInsertBoardPieceUp(r, c, notWhosTurn, whosTurn, false) ) canInsert = true;
					if( checkCanInsertBoardPieceUpRight(r, c, notWhosTurn, whosTurn, false) ) canInsert = true;
					if( checkCanInsertBoardPieceRight(r, c, notWhosTurn, whosTurn, false) ) canInsert = true;
					if( checkCanInsertBoardPieceDownRight(r, c, notWhosTurn, whosTurn, false) ) canInsert = true;
					if( checkCanInsertBoardPieceDown(r, c, notWhosTurn, whosTurn, false) ) canInsert = true;
					if( checkCanInsertBoardPieceDownLeft(r, c, notWhosTurn, whosTurn, false) ) canInsert = true;
					if( checkCanInsertBoardPieceLeft(r, c, notWhosTurn, whosTurn, false) ) canInsert = true;

					if(canInsert){
						movesBoard[r][c] = 1;
						noMoves = false;
					}
					}
					else if(whosTurn==0 && state!=1 && isShowingAvailableMoves) //starting move
					{
						if( checkCanInsertBoardPieceUpLeft(r, c, 1, -1, false) ) canInsert = true;
						if( checkCanInsertBoardPieceUp(r, c, 1, -1, false) ) canInsert = true;
						if( checkCanInsertBoardPieceUpRight(r, c, 1, -1, false) ) canInsert = true;
						if( checkCanInsertBoardPieceRight(r, c, 1, -1, false) ) canInsert = true;
						if( checkCanInsertBoardPieceDownRight(r, c, 1, -1, false) ) canInsert = true;
						if( checkCanInsertBoardPieceDown(r, c, 1, -1, false) ) canInsert = true;
						if( checkCanInsertBoardPieceDownLeft(r, c, 1, -1, false) ) canInsert = true;
						if( checkCanInsertBoardPieceLeft(r, c, 1, -1, false) ) canInsert = true;
						if(canInsert){ movesBoard[r][c] = 1; }
						canInsert = false;
						if( checkCanInsertBoardPieceUpLeft(r, c, -1, 1, false) ) canInsert = true;
						if( checkCanInsertBoardPieceUp(r, c, -1, 1, false) ) canInsert = true;
						if( checkCanInsertBoardPieceUpRight(r, c, -1, 1, false) ) canInsert = true;
						if( checkCanInsertBoardPieceRight(r, c, -1, 1, false) ) canInsert = true;
						if( checkCanInsertBoardPieceDownRight(r, c, -1, 1, false) ) canInsert = true;
						if( checkCanInsertBoardPieceDown(r, c, -1, 1, false) ) canInsert = true;
						if( checkCanInsertBoardPieceDownLeft(r, c, -1, 1, false) ) canInsert = true;
						if( checkCanInsertBoardPieceLeft(r, c, -1, 1, false) ) canInsert = true;
						if(canInsert) { movesBoard[r][c] = 1; }
						noMoves=false;
					}

				}
			}
		}

		if(noMoves)
			return false;
		else
			return movesBoard;
	}

	function flipPiecesFrom(i, j, r, c, maxFlipPr)
	{
		board[i][j] *= -1;
		rectBoard[i][j].flipToZero = true;
		rectBoard[i][j].flipPr = maxFlipPr;
		maxFlipPr++;

		if(i!=r || j!=c)
		{
			if(i<r)
				i++;
			else if(i>r)
				i--;

			if(j<c)
				j++;
			else if(j>c)
				j--;
			flipPiecesFrom(i, j, r, c, maxFlipPr);
		}
	}

	function randomlyInsertPieceLeftToRight()
	{
		var insertedPiece = false;
		for (var r = 0; insertedPiece==false && r < numRows; r++)
		{
			for(var c = 0; insertedPiece==false && c < numCols; c++)

				if( canInsertBoardPieceAt(r,c) )
				{
					insertedPiece = true;
					if(!isFlipping && waitmsec==0)
						waitmsec = 10;
					nowPr[nowPrI] = 0;
					if(nowPrI<numPr-1)
						nowPrI++;
					else
						nowPrI=0;
					noMovesMsec = 0;
					noMovesAvailable = false;
					insertBoardPieceAt(r, c);
					switchTurn();
      				playPlaceSound();
				}
			}
		}
	}

	function randomlyInsertPieceRightToLeft()
	{
		var insertedPiece = false;
		for (var r = numRows-1; insertedPiece==false && r >= 0; r--)
		{
			for(var c = numCols-1; insertedPiece==false && c >= 0; c--)
			{
				if( canInsertBoardPieceAt(r,c) )
				{
					insertedPiece = true;
					waitmsec = 20;
					nowPr = 0;
					insertBoardPieceAt(r, c);
					switchTurn();
      		   		playPlaceSound();
				}
			}
		}
	}

	function checkCanInsertBoardPieceUpLeft(r, c, notWhosTurn, whosTurn, shouldFlip)
	{
		if( r - 1 >= 0 && c - 1 >= 0 && board[r-1][c-1] == notWhosTurn)
			for(var i = r - 1, j = c - 1; i >= 0 && j >= 0; i--,j--)
			{
					if(board[i][j]==whosTurn)
					{
						if(shouldFlip) flipPiecesFrom(r-1, c-1, i+1, j+1, 0);
						return true;
					}
					else if(board[i][j] == 0)
						break;
			}
	}

	function checkCanInsertBoardPieceUp(r, c, notWhosTurn, whosTurn, shouldFlip)
	{
		if( r - 1 >= 0 && board[r-1][c] == notWhosTurn)
			for(var i = r - 1; i >= 0; i--)
			{
				if(board[i][c]==whosTurn)
				{
					if(shouldFlip) flipPiecesFrom(r-1, c, i+1, c, 0);
					return true;
				}
				else if(board[i][c] == 0)
					break;
			}
	}

	function checkCanInsertBoardPieceUpRight(r, c, notWhosTurn, whosTurn, shouldFlip)
	{
		if( r - 1 >= 0 && c + 1 < numCols && board[r-1][c+1] == notWhosTurn)
			for(var i = r - 1, j = c + 1; i >= 0 && j < numCols; i--,j++)
			{
					if(board[i][j]==whosTurn)
					{
						if(shouldFlip) flipPiecesFrom(r-1, c+1, i+1, j-1, 0);
						return true;
					}
					else if(board[i][j] == 0)
						break;
			}
	}

	function checkCanInsertBoardPieceRight(r, c, notWhosTurn, whosTurn, shouldFlip)
	{
		if( c + 1 < numCols && board[r][c+1] == notWhosTurn)
			for(var j = c + 1; j < numCols; j++)
			{
				if(board[r][j]==whosTurn)
				{
					if(shouldFlip) flipPiecesFrom(r, c+1, r, j-1, 0);
					return true;
				}
				else if(board[r][j] == 0)
					break;
			}
	}

	function checkCanInsertBoardPieceDownRight(r, c, notWhosTurn, whosTurn, shouldFlip)
	{
		//down right
		if( r + 1 < numRows && c + 1 < numCols && board[r+1][c+1] == notWhosTurn)
			for(var i = r + 1, j = c + 1; i < numRows && j < numCols; i++,j++)
			{
					if(board[i][j]==whosTurn)
					{
						if(shouldFlip) flipPiecesFrom(r+1, c+1, i-1, j-1, 0);
						return true;
					}
					else if(board[i][j] == 0)
						break;
			}
	}

	function checkCanInsertBoardPieceDown(r, c, notWhosTurn, whosTurn, shouldFlip)
	{
		if(r + 1 < numRows && board[r+1][c] == notWhosTurn)
			for(var i = r + 1; i < numRows; i++)
			{
				if(board[i][c]==whosTurn)
				{
					if(shouldFlip) flipPiecesFrom(r+1, c, i-1, c, 0);
					return true;
				}
				else if(board[i][c] == 0)
					break;
			}
	}

	function checkCanInsertBoardPieceDownLeft(r, c, notWhosTurn, whosTurn, shouldFlip)
	{
		if(r + 1 < numRows && c - 1 >= 0 && board[r+1][c-1] == notWhosTurn)
			for(var i = r + 1, j = c - 1; i < numRows && j>= 0; i++,j--)
			{
				if(board[i][j]==whosTurn)
				{
					if(shouldFlip) flipPiecesFrom(r+1, c-1, i-1, j+1, 0);
					return true;
				}
				else if(board[i][j] == 0)
					break;
			}
	}

	function checkCanInsertBoardPieceLeft(r, c, notWhosTurn, whosTurn, shouldFlip)
	{
		if(c - 1 >= 0 && board[r][c-1] == notWhosTurn)
			for(var j = c - 1; j >= 0; j--)
			{
				if(board[r][j]==whosTurn)
				{
					if(shouldFlip) flipPiecesFrom(r, c-1, r, j+1, 0);
					return true;
				}
				else if(board[r][j] == 0)
					break;
			}
	}

	function checkFirstMoveSetWhosTurn(r, c)
	{
		var canInsert = false;

 		if( board[r][c] != 0 )
 			return false;

 		var whosTurnTemp = 1;

 		for(var i = 0; i < 2; i++)
 		{
 			if( checkCanInsertBoardPieceUpLeft(r, c, whosTurnTemp, whosTurnTemp*-1, true) ) canInsert = true;
			if( checkCanInsertBoardPieceUp(r, c, whosTurnTemp, whosTurnTemp*-1, true) ) canInsert = true;
			if( checkCanInsertBoardPieceUpRight(r, c, whosTurnTemp, whosTurnTemp*-1, true) ) canInsert = true;
			if( checkCanInsertBoardPieceRight(r, c, whosTurnTemp, whosTurnTemp*-1, true) ) canInsert = true;
			if( checkCanInsertBoardPieceDownRight(r, c, whosTurnTemp, whosTurnTemp*-1, true) ) canInsert = true;
			if( checkCanInsertBoardPieceDown(r, c, whosTurnTemp, whosTurnTemp*-1, true) ) canInsert = true;
			if( checkCanInsertBoardPieceDownLeft(r, c, whosTurnTemp, whosTurnTemp*-1, true) ) canInsert = true;
			if( checkCanInsertBoardPieceLeft(r, c, whosTurnTemp, whosTurnTemp*-1, true) ) canInsert = true;

			if(canInsert==true)
			{
				whosTurn = whosTurnTemp*-1;
				return true;
			}
			whosTurnTemp *=-1;
		}

		return canInsert;
	}

	function canInsertBoardPieceAt(r, c)
	{
		var canInsert = false;
 		var notWhosTurn =  whosTurn * -1;

 		if( board[r][c] != 0 )
 			return false;

 		if( checkCanInsertBoardPieceUpLeft(r, c, notWhosTurn, whosTurn, true) ) canInsert = true;
		if( checkCanInsertBoardPieceUp(r, c, notWhosTurn, whosTurn, true) ) canInsert = true;
		if( checkCanInsertBoardPieceUpRight(r, c, notWhosTurn, whosTurn, true) ) canInsert = true;
		if( checkCanInsertBoardPieceRight(r, c, notWhosTurn, whosTurn, true) ) canInsert = true;
		if( checkCanInsertBoardPieceDownRight(r, c, notWhosTurn, whosTurn, true) ) canInsert = true;
		if( checkCanInsertBoardPieceDown(r, c, notWhosTurn, whosTurn, true) ) canInsert = true;
		if( checkCanInsertBoardPieceDownLeft(r, c, notWhosTurn, whosTurn, true) ) canInsert = true;
		if( checkCanInsertBoardPieceLeft(r, c, notWhosTurn, whosTurn, true) ) canInsert = true;

		return canInsert;
	}

	function insertBoardPieceAt(r, c)
	{
		board[r][c] = whosTurn;
	}

</script>
