<!doctype html>
<html>

<!-- This is the first tutorial of the Nintendo Web Framework (NWF).-->
<!-- To simplify the tutorial, the style information and JavaScript are included in an HTML file.-->

<!-- In the next tutorial, CSS and JavaScript are split off into separate files, -->
<!-- so that this sample runs on PCs. -->

<!-- The margin is set to 0 so that there is no extra space around the canvas.-->
<body style="margin: 0;">

<!-- import needed apis -->
<!-- This is the GamePad canvas.-->
<!-- Set the scroll bar display to "block."-->
<canvas id="gpCanvas" style="display: block;"></canvas>

<!-- Everything after this point is JavaScript code.-->
<script type="text/javascript">

	// This code specifies the rendering resolution.
	// Set the resolution to 720p in the Dashboard project settings.
	var GP_WIDTH = 854, GP_HEIGHT = 480,
		TV_WIDTH = 1280, TV_HEIGHT = 720;

	// This code declares the canvas and rendering context variables.
	var gpCanvas, gpContext, tvCanvas, tvContext;

	window.addEventListener("load", function () {
		console.log("HEELO");
		// Initialize the canvas for displaying the Gamepad and the rendering context.
		gpCanvas = window.document.getElementById("gpCanvas");
		gpCanvas.width = GP_WIDTH;
		gpCanvas.height = GP_HEIGHT;
		gpContext = gpCanvas.getContext("2d", {antialias: '2x'});
		
		var popup = window.open("index.html");
		popup.addEventListener('load', function() {window.location.href="index.html";}, true); 
	//	popup.blur();
	//	window.focus();
		
		window.webkitRequestAnimationFrame(mainLoop);
	});

	var time = 0;
	function mainLoop() {
		//drawBlueBoard();
		gpContext.fillRect(0, 0, 200, 200);
		//window.location.href="index.html";
		// This function is called again along with the next page display update.
		//window.webkitRequestAnimationFrame(mainLoop);
	}

</script>
</body>
</html>
