<!doctype html>
<html>

<!-- The Wii U displays this HTML file on the TV screen.-->
<!-- It is loaded from the JavaScript in index.html.-->

<!-- The margin is set to 0 so that there is no extra space around the canvas.-->
<body style="margin: 0;">

<!-- This is the canvas for TV screen display.-->
<!-- Set the scroll bar display to "block."-->
<canvas id="tvCanvas" style="display: block;"></canvas>

</body>
</html>
